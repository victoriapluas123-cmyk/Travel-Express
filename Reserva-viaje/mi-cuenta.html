<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mi cuenta — Travel Express</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />

</head>

<body>
    <!-- Navbar (same markup as index; simplified) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Travel Express</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
                aria-controls="nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="mis-reservas.html">Reservas</a></li>
                    <li class="nav-item"><a class="nav-link" href="Destino.html">Destino</a></li>
                    <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
                    <li class="nav-item"><a class="nav-link" href="ofertas.html">Ofertas</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin-dashboard.html">Admin</a></li>


                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <h1 class="h3 mb-3">Mi cuenta</h1>

        <div id="account-info" class="card mb-3">
            <div class="card-body">
                <p class="mb-1"><strong>Nombre:</strong> <span id="account-name">—</span></p>
                <p class="mb-1"><strong>Email:</strong> <span id="account-email">—</span></p>
                <p class="mb-0"><strong>Rol:</strong> <span id="account-role">—</span></p>
            </div>
        </div>

        <div class="mb-3">
            <a class="btn btn-outline-primary" href="mis-reservas.html">Ver mis reservas</a>
            <button id="logout-btn" class="btn btn-secondary ms-2">Cerrar sesión</button>
        </div>

        <section>
            <h2 class="h5">Actividad</h2>
            <div id="account-activity" class="small text-muted">Cargando actividad...</div>
        </section>
    </main>

    <footer class="bg-dark text-white py-3 mt-auto">
        <div class="container d-flex justify-content-between">
            <div>&copy; 2024 Travel Spres</div>
            <div>
                <a class="text-white me-2" href="https://facebook.com/YourPage" target="_blank"><i
                        class="fa-brands fa-facebook"></i> Facebook</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // pequeña lógica para obtener info del usuario
        (async function () {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }
            const res = await fetch('/api/me', { headers: { Authorization: 'Bearer ' + token } });
            if (!res.ok) {
                localStorage.removeItem('token');
                window.location.href = 'index.html';
                return;
            }
            const user = await res.json();
            document.getElementById('account-name').textContent = user.name || '-';
            document.getElementById('account-email').textContent = user.email || '-';
            document.getElementById('account-role').textContent = user.role || '-';
            document.getElementById('account-activity').textContent = 'Aquí aparecerá tu actividad reciente y reservas.';
        })();

        document.getElementById('logout-btn').addEventListener('click', function () {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
